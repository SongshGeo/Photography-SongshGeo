baseURL = 'https://gallery.songshgeo.com/'
title = 'Shuang - Explorer'
theme = 'gallery'

# Multilingual: English at /, 中文 at /zh/. Keep EN at the root so the shared
# /trips/ gallery URLs (and external links to them) don't move.
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

# Content settings
[pagination]
  pagerSize = 100
enableRobotsTXT = true
enableGitInfo = true

# Theme settings
[params]
  description = 'A photography gallery showcasing the work of SongshGeo'
  copyright = '© 2025 SongshGeo. All rights reserved.'
  defaultTheme = 'light'  # 'light', 'dark', or 'auto' — locked to light for the editorial look
  wordmark = 'Shuang Song'  # brand text shown top-left (separate from the SEO title)
  currentPersona = 'Explorer'  # highlights this identity in the dropdown

  # Persona switcher shown in the top-left wordmark dropdown
  [[params.personas]]
    name = 'Scientist'
    label = 'As a Scientist'
    blurb = 'Academic site'
    url = 'https://cv.songshgeo.com/'
    external = true
  [[params.personas]]
    name = 'Explorer'
    label = 'As an Explorer'
    blurb = 'Essays & longform blog'
    url = 'https://songshgeo.com/'
    external = true
  [[params.personas]]
    name = 'Developer'
    label = 'As a Developer'
    blurb = 'Open source on GitHub'
    url = 'https://github.com/SongshGeo'
    external = true
  
  [params.author]
    name = 'Shuang Song (SongshGeo)'
    email = 'SongshGeo@gmail.com'
  
  # Social icons
  [params.socialIcons]
    github = 'https://github.com/SongshGeo'
    email = 'mailto:SongshGeo@gmail.com'
    # Add academic and blog links
    website = 'https://songshgeo.com/'
    cv = 'https://cv.songshgeo.com/'

# Image processing
[imaging]
  # Default resample filter used for resizing
  resampleFilter = 'lanczos'
  # Default JPEG quality
  quality = 85
  # Anchor used when cropping pictures
  anchor = 'smart'
  # Default background color
  bgColor = '#ffffff'

# Related content configuration
[related]
  includeNewer = true
  threshold = 10
  toLower = false
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'categories'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 10
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'tags'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 50

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

# Markup configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Single-gallery justified layout — airier spacing for the editorial look
# (read by themes/gallery/layouts/partials/head.html)
[params.gallery]
  targetRowHeight = 340
  boxSpacing = 14
  targetRowHeightTolerance = 0.25

# ── Languages ──────────────────────────────────────────────────────────────
# Menus are defined per-language here (no front-matter menus), so each language
# gets fully localized nav labels. "Trips" stays at /trips/ in both languages
# because the galleries are language-neutral and shared (not translated).
[languages]
  [languages.en]
    languageCode = 'en-us'
    languageName = 'English'
    contentDir = 'content'
    weight = 1
    title = 'Shuang - Explorer'
    [languages.en.params]
      wordmark = 'Shuang Song'

    [[languages.en.menus.main]]
      name = 'Home'
      url = '/'
      weight = -1
    [[languages.en.menus.main]]
      name = 'Trips'
      url = '/trips/'
      weight = 10
    [[languages.en.menus.main]]
      name = 'About'
      url = '/about/'
      weight = 30
    [[languages.en.menus.main]]
      name = 'Journal'
      url = 'https://songshgeo.com/'
      weight = 40
      [languages.en.menus.main.params]
        rel = 'noopener'
        external = true
    [[languages.en.menus.main]]
      name = 'Contact'
      url = 'mailto:SongshGeo@gmail.com'
      weight = 60
      [languages.en.menus.main.params]
        external = true

    [[languages.en.menus.footer]]
      name = 'About'
      url = '/about/'
      weight = 10
    [[languages.en.menus.footer]]
      name = 'Imprint'
      url = '/imprint/'
      weight = 20

  [languages.zh]
    languageCode = 'zh-CN'
    languageName = '中文'
    contentDir = 'content'
    weight = 2
    title = '宋爽 - 探索者'
    [languages.zh.params]
      wordmark = '宋爽'
      description = '一个展示宋爽摄影作品的画廊。'

    [[languages.zh.menus.main]]
      name = '首页'
      url = '/zh/'
      weight = -1
    [[languages.zh.menus.main]]
      name = '旅行'
      url = '/trips/'
      weight = 10
    [[languages.zh.menus.main]]
      name = '关于'
      url = '/zh/about/'
      weight = 30
    [[languages.zh.menus.main]]
      name = '随笔'
      url = 'https://blog.songshgeo.com/'
      weight = 40
      [languages.zh.menus.main.params]
        rel = 'noopener'
        external = true
    [[languages.zh.menus.main]]
      name = '联系'
      url = 'mailto:SongshGeo@gmail.com'
      weight = 60
      [languages.zh.menus.main.params]
        external = true

    [[languages.zh.menus.footer]]
      name = '关于'
      url = '/zh/about/'
      weight = 10
    [[languages.zh.menus.footer]]
      name = 'Imprint'
      url = '/imprint/'
      weight = 20
