baseURL = 'https://gallery.songshgeo.com/'
languageCode = 'en-us'
title = 'Shuang - Explorer'
theme = 'gallery'

# Content settings
[pagination]
  pagerSize = 100
enableRobotsTXT = true
enableGitInfo = true

# Theme settings
[params]
  description = 'A photography gallery showcasing the work of SongshGeo'
  copyright = '© 2025 SongshGeo. All rights reserved.'
  defaultTheme = 'light'  # 'light', 'dark', or 'auto' — locked to light for the editorial look
  wordmark = 'Shuang Song'  # brand text shown top-left (separate from the SEO title)
  currentPersona = 'Explorer'  # highlights this identity in the dropdown

  # Persona switcher shown in the top-left wordmark dropdown
  [[params.personas]]
    name = 'Scientist'
    label = 'As a Scientist'
    blurb = 'Academic site'
    url = 'https://cv.songshgeo.com/'
    external = true
  [[params.personas]]
    name = 'Explorer'
    label = 'As an Explorer'
    blurb = 'Essays & longform blog'
    url = 'https://songshgeo.com/'
    external = true
  [[params.personas]]
    name = 'Developer'
    label = 'As a Developer'
    blurb = 'Open source on GitHub'
    url = 'https://github.com/SongshGeo'
    external = true
  
  [params.author]
    name = 'Shuang Song (SongshGeo)'
    email = 'SongshGeo@gmail.com'
  
  # Social icons
  [params.socialIcons]
    github = 'https://github.com/SongshGeo'
    email = 'mailto:SongshGeo@gmail.com'
    # Add academic and blog links
    website = 'https://songshgeo.com/'
    cv = 'https://cv.songshgeo.com/'

# Image processing
[imaging]
  # Default resample filter used for resizing
  resampleFilter = 'lanczos'
  # Default JPEG quality
  quality = 85
  # Anchor used when cropping pictures
  anchor = 'smart'
  # Default background color
  bgColor = '#ffffff'

# Related content configuration
[related]
  includeNewer = true
  threshold = 10
  toLower = false
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'categories'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 10
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'tags'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 50

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

# Markup configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Single-gallery justified layout — airier spacing for the editorial look
# (read by themes/gallery/layouts/partials/head.html)
[params.gallery]
  targetRowHeight = 340
  boxSpacing = 14
  targetRowHeightTolerance = 0.25

# Primary navigation (rendered in the persistent top bar).
# "Home" comes from content/_index.md and "Trips" from content/trips/_index.md.
[[menu.main]]
  name = 'About'
  url = '/about/'
  weight = 30

[[menu.main]]
  name = 'Journal'
  url = 'https://songshgeo.com/'
  weight = 40
  [menu.main.params]
    rel = 'noopener'
    external = true

[[menu.main]]
  name = 'Contact'
  url = 'mailto:SongshGeo@gmail.com'
  weight = 60
  [menu.main.params]
    external = true

# Footer links
[[menu.footer]]
  name = 'About'
  url = '/about/'
  weight = 10

[[menu.footer]]
  name = 'Imprint'
  url = '/imprint/'
  weight = 20
